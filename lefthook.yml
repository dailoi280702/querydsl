# Lefthook configuration (Husky + Lint-Staged alternative)
pre-commit:
  parallel: false # Disable parallel to avoid git lock issues
  commands:
    gci:
      glob: "*.go"
      run: gci write -s standard -s default -s "Prefix(querydsl)" {staged_files}
    gofumpt:
      glob: "*.go"
      run: gofumpt -w {staged_files}
    lint:
      glob: "*.go"
      run: golangci-lint run
